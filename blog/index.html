dx&quot;],&quot;slug&quot;:[0,&quot;kidsplay/hardware&quot;],&quot;body&quot;:[0,&quot;\nimport Figure from \&quot;../../../components/Figure.astro\&quot;\nimport Video from \&quot;../../../components/Video.astro\&quot;\nimport Callout from \&quot;../../../components/Callout.astro\&quot;\n\nMy son&#39;s passion in life is letting his imagination go wild. He can walk in circles\nacting out \&quot;his\&quot; movies, trailers, stories, and ... will even read you the reviews\nabout them so you know for what age they&#39;re appropriate for and why. He&#39;s a trip.\n\nOne aspect of today&#39;s media landscape my wife and I find incredibly frustrating is the\ncomplete and utter lack of control over what and how a child with access to a device\nis able to consume. It doesn&#39;t matter which platform you&#39;re talking about: Disney+,\nYouTube Kids, PBS Kids, Spotify. All of them try to lure kids (and adults) down the\npath of infinite scrolling to find worse and worse content. None of them allow curation\nof the media kids consume (they will tell you what&#39;s good for your child). The vast\nmajority of content on the internet, even the content given the \&quot;Okay for Kids!\&quot;\nrubber stamp, is, well, garbage: flashing lights, high-adrenaline, questionable dialog,\nanything to give kids that dopamine rush that keeps them glued to the screen. It&#39;s\nhorrifying, frankly, to think about letting a kid loose with a device with access to\nthose things.\n\nPrivately hosted media storage is a great way to solve the curation problem, but for\nyoung kids (four and six) none really address the problem in a form usable for children\nand without all of the addictive bells and whistles. In my spare time (which is not much\nwith little kids) I&#39;ve put together a device, the kids&#39; \&quot;radios\&quot;, that allows us to\nfeel secure in sending them off with media that we know is okay for them, delivered in\na format that we&#39;re comfortable is not of the damaging \&quot;screen time\&quot; variety slowly\nmelting their brains and robbing them of their autonomy.\n\nToday, the application itself is easily whipped together with a coding\nLLM. In my kids stack, I have a web interface running on our home network that makes\nit easy to add or remove content that gets synced to the kids&#39; radios automatically.\nWhat was really challenging was bringing the hardware up, which is the subject of this\npost.\n\nI&#39;ll share what was needed to set up the hardware for a kid-friendly handheld media player.\nMine serves only **music, audiobooks, and photos** and nothing else — no video,\nno autoplay, no recommendations. The library is curated by us, the parents; the device plays\nonly what is loaded onto it and runs entirely offline. The interface produces motion\nor sound only when moving around the menu.\n\nHere is a picture of the radio, or [skip to the video](#final-result) at the end to see\nit in action!\n\n&lt;Figure\n  src=\&quot;/assets/blog/kidsplay/radio.jpg\&quot;\n  caption=\&quot;The device with the radio application running.\&quot;\n  maxHeight=\&quot;30rem\&quot;\n/&gt;\n\nThis post covers building the hardware into a pygame kiosk: a device that powers\non directly into the app, fullscreen, with no visible desktop, while remaining a\nstandard Linux machine that can be reached over SSH. I used a LLM to turn my scattered\nnotes and documentation into coherent instructions, I think it covered everything well.\n\n&lt;Callout type=\&quot;note\&quot; title=\&quot;What you&#39;ll end up with\&quot;&gt;\nA Raspberry Pi CM4 in a GPi Case 2 that boots directly into a fullscreen\n`pygame-ce` application, runs the app as a normal (non-root) user, and keeps the\ndesktop and VNC installed and startable on demand. SSH is always available. This\nguide uses a \&quot;hello world\&quot; pygame app as a stand-in for your own application.\n&lt;/Callout&gt;\n\n## The hardware\n\nThe hardware is excessive, you can get away with much cheaper specs, especially if you\ngo the microcontroller route. I did not. I wanted a fun device that\ncombined audio, a display, and a tactile (non-touch) interface, so a hand-held gaming\nplatform seemed like a nice fit. As for avoiding a microcontroller, it&#39;s much less\nwork to live in a Linux userspace where I benefited from robust tooling for the app\nitself and easy connection to the homelab for synchronizing media to two kids platforms\nand keeping the devices up-to-date.\n\nI used three components:\n\n- **Retroflag GPi Case 2.** A Game Boy-style shell that takes a Compute Module 4,\n  with a 640×480 display, a D-pad and buttons wired as a USB gamepad, a speaker,\n  and a physical power switch. Found [here](https://retroflag.com/gpi_case_2.html).\n  I recommend the variant with the docking station, it makes a nice stand.\n- **Raspberry Pi Compute Module 4 (CM4).** Use a **Lite** variant (no on-board\n  eMMC) so it boots from microSD, and a **wireless** model, since WiFi is needed\n  for SSH and syncing.\n- **A high-endurance microSD card.**\n\n&lt;Callout type=\&quot;tip\&quot; title=\&quot;RAM requirements are low\&quot;&gt;\nThe finished appliance idles around 300–400 MB of RAM. A **1 GB** CM4 is\nsufficient. Larger modules are unnecessary unless your app will be memory-heavy.\n&lt;/Callout&gt;\n\n&lt;Callout type=\&quot;tip\&quot; title=\&quot;High-endurance microSD card\&quot;&gt;\nI have ... an embarrassing number of Raspberry Pis. Random microSD failures are really\nfrustrating. I switched over to high-endurance cards and never again had a problem.\n&lt;/Callout&gt;\n\n## Step 1 — Flash Raspberry Pi OS\n\nUse the [Raspberry Pi Imager](https://www.raspberrypi.com/software/). Choose\n**Raspberry Pi OS (64-bit)** — this guide targets the current **Debian 13\n\&quot;trixie\&quot;** release, which uses the Wayland desktop (`labwc`) by default. Pick the\nCM4 as the device and your microSD as the storage.\n\nBefore writing, open the **OS customization** settings (the gear icon) and configure\nthese bits:\n\n- **Hostname** (e.g. `radio`).\n- **Username and password**.\n- **WiFi** SSID, password, and country.\n- **Locale / timezone / keyboard.**\n- On the **Services** tab, **enable SSH** and paste your **public key** (key\n  auth, not password).\n\n&lt;Callout type=\&quot;tip\&quot; title=\&quot;Configure SSH in the Imager\&quot;&gt;\nSetting WiFi and the SSH public key in the Imager means the first boot comes up on\nthe network, headless. No keyboard or monitor needs to be attached to the case\nduring or after setup.\n&lt;/Callout&gt;\n\n## Step 2 — Configure config.txt\n\nThe GPi Case 2&#39;s screen is a raw DPI panel, and the Pi will not drive it correctly\nwithout configuration. One of the more frustrating aspects of this project was setting\nit up correctly. Retroflag&#39;s scripts don&#39;t work, so I had to install Recalbox first and\ntry to back out the correct settings. It was a real PITA to get it stable, some specifications\nwould have been nice. (I&#39;m not bitter. Anymore.)\n\nHere is my whole `config.txt` (in `/boot/firmware/`) with the stock boilerplate and\ncommented-out interfaces stripped out. Most of it is ordinary defaults; the lines that\nmatter for this build are the **audio** (a music player is useless without it), the\n**fake-KMS and DPI overlays**, and the **panel timings** at the bottom.\n\n```ini\n# Onboard audio (snd_bcm2835) — needed for music and audiobooks.\ndtparam=audio=on\n\n# The DPI panel takes over the GPIO header; skip the firmware safe-mode check.\navoid_safe_mode=1\n\n# Let the kernel own the display mode: don&#39;t have the firmware inject a video=\n# line into cmdline.txt — we set the DPI mode there ourselves (see below).\ndisable_fw_kms_setup=1\n\n# Stock Raspberry Pi OS defaults and appliance tweaks, left in place.\ndisplay_auto_detect=1\nauto_initramfs=1\ndisable_overscan=1\narm_boost=1\nenable_uart=0\n\n[cm4]\narm_64bit=1\n# USB host mode for the case&#39;s built-in controls (a USB gamepad).\ndtoverlay=dwc2,dr_mode=host\n# Fake KMS video driver (see the warning below).\ndtoverlay=vc4-fkms-v3d\ndtoverlay=dpi18\n\n[all]\nmax_framebuffers=2\nhdmi_ignore_hotplug=1\n\n# --- 640x480 DPI panel timings for the GPi Case 2 ---\ngpio=0-17,19-25=a2\nenable_dpi_lcd=1\ndisplay_default_lcd=1\ndpi_group=2\ndpi_mode=87\ndpi_output_format=0x00016\ndpi_timings=640 0 41 40 41 480 0 18 9 18 0 0 0 60 0 24000000 1\n```\n\n&lt;Callout type=\&quot;danger\&quot; title=\&quot;Do not modify the display lines later\&quot;&gt;\nOnce the panel works, leave the display overlays and DPI timings unchanged. Note the\n`vc4-fkms-v3d` overlay — this is **fake KMS**, which is relevant in Step 7. Do not\nchange it to full KMS (`vc4-kms-v3d`). On this DPI panel that produces a black screen\nwith no local display to recover from.\n&lt;/Callout&gt;\n\n## Step 3 — First boot, SSH, and raspi-config\n\nInsert the card, assemble the case, and power on. Give it a minute, then SSH in\nusing the hostname you set:\n\n```bash\nssh pi@radio.local\n```\n\nThe panel may or may not come up correctly on this first boot. The display overlays\nare set in `config.txt`, but the kernel&#39;s video mode isn&#39;t pinned until you edit\n`cmdline.txt` (below), so the screen can be blank, garbled, or off-center at this\npoint. That&#39;s expected — everything in this step is done headless over SSH.\n\nThen run the configuration tool:\n\n```bash\nsudo raspi-config\n```\n\nConfigure these:\n\n- **Advanced → Expand Filesystem**, so the OS can use the whole card.\n- **System → Boot / Auto Login → Desktop Autologin.** This changes to console\n  boot later; the desktop is brought up first as an intermediate step.\n- **Display → Screen Blanking → Disable.**\n- **Interface → VNC → Enable.** On trixie this enables `wayvnc`, used during setup\n  and kept on reserve.\n- Verify **Localisation** (locale, timezone, WiFi country).\n\n### Set the display mode in cmdline.txt\n\n`config.txt` handles the panel on the firmware side, but the kernel command line —\n`cmdline.txt`, in `/boot/firmware/` — needs a few entries of its own for the display\nand controls to behave. Edit it here, **after the first boot and over SSH**, rather than on the card\nbeforehand: the Imager has already written the correct `root=PARTUUID=...` for your\ncard into this file, and you only want to append the flags below to the line it wrote.\nIt is a **single line** — keep everything space-separated on one line.\n\n&lt;div class=\&quot;wrap-code\&quot;&gt;\n\n```text\ndwc_otg.fiq_fix_enable=1 dwc_otg.lpm_enable=0 console=tty3 consoleblank=0 root=PARTUUID=da86f6bf-02 rootfstype=ext4 fsck.repair=yes splash rootwait fastboot noswap plymouth.ignore-serial-consoles cfg80211.ieee80211_regdom=US video=DPI-1:640x480@60D quiet usbcore.autosuspend=-1\n```\n\n&lt;/div&gt;\n\nThe parts that matter for this build:\n\n- **`video=DPI-1:640x480@60D`** — sets the kernel modeset for the DPI connector to\n  match the `dpi_timings` in `config.txt`. Under fake KMS the kernel still brings up a\n  framebuffer console, and without this it can pick the wrong mode — which is exactly\n  why the panel may have looked wrong on that first boot. The trailing `D` requests the\n  digital DPI mode rather than an analog/HDMI fallback.\n- **`console=tty3`** — moves the boot/kernel console off `tty1`. The kiosk app owns\n  `tty1` (Step 7), so parking kernel log output on `tty3` keeps that spew from\n  drawing over the app&#39;s terminal during and after boot.\n- **`consoleblank=0`** — disables the kernel console&#39;s blanking timeout, the\n  console-level counterpart to the **Screen Blanking → Disable** you just set in\n  raspi-config; the panel should never go black on its own.\n- **`usbcore.autosuspend=-1`** — disables USB autosuspend. The case&#39;s D-pad and\n  buttons are a USB gamepad, and with autosuspend on, the first input after an idle\n  period can be dropped or laggy. Disabling it keeps the controls instant.\n\nThe rest is appliance hygiene: `quiet splash plymouth.ignore-serial-consoles` for a\nquiet, splash-only boot, `noswap` and `fastboot` to skip swap and the boot-time fsck,\nand `cfg80211.ieee80211_regdom=US` to pin the WiFi regulatory domain.\n\n&lt;Callout type=\&quot;danger\&quot; title=\&quot;Your root PARTUUID will differ\&quot;&gt;\n`root=PARTUUID=da86f6bf-02` is specific to my card — **don&#39;t copy it.** Keep whatever\nthe Imager wrote for `root=`, `rootfstype=`, `fsck.repair=`, and `rootwait`, or the Pi\nwon&#39;t find its root filesystem. Only append the display and appliance flags to the\nexisting line.\n&lt;/Callout&gt;\n\nThen reboot again.\n\n&lt;Callout type=\&quot;note\&quot; title=\&quot;Why bring the desktop up first\&quot;&gt;\nThe final target is a console boot with no desktop. Bringing up the full desktop\nfirst confirms the display, WiFi, audio, and controls work through the standard\npath, isolating hardware issues from boot-behavior issues.\n&lt;/Callout&gt;\n\n## Step 4 — Update and install tools\n\n```bash\nsudo apt update &amp;&amp; sudo apt full-upgrade -y\nsudo apt install -y htop vim git # whatever you plan to use\n```\n\nI installed [`uv`](https://docs.astral.sh/uv/) to manage Python and keep each project&#39;s\nenvironment self-contained, but you do you.\n\n```bash\ncurl -LsSf https://astral.sh/uv/install.sh | sh\n```\n\nI also recommend replacing the default desktop environment with LXDE. Gnome and KDE are\nslow on a microSD card and seemed to make the display less reliable, no clue why.\n\n## Step 5 — A minimal pygame app\n\nThe stand-in app opens a fullscreen 640×480 window, hides the mouse pointer, and\nquits on &lt;kbd&gt;Esc&lt;/kbd&gt;. Replace it with your real app later.\n\n```python\n# ~/radio-app/hello_pygame.py\nimport sys\nimport pygame\n\npygame.init()\nscreen = pygame.display.set_mode((640, 480), pygame.FULLSCREEN)\npygame.mouse.set_visible(False)\nfont = pygame.font.SysFont(None, 56)\nclock = pygame.time.Clock()\n\nrunning = True\nwhile running:\n    for event in pygame.event.get():\n        if event.type == pygame.QUIT:\n            running = False\n        elif event.type == pygame.KEYDOWN and event.key == pygame.K_ESCAPE:\n            running = False\n\n    screen.fill((20, 24, 40))\n    text = font.render(\&quot;Hello from the GPi!\&quot;, True, (235, 235, 245))\n    screen.blit(text, text.get_rect(center=(320, 240)))\n    pygame.display.flip()\n    clock.tick(30)\n\npygame.quit()\nsys.exit()\n```\n\nSet up its environment with `uv` and confirm it runs from the desktop first:\n\n```bash\nmkdir -p ~/radio-app &amp;&amp; cd ~/radio-app\nuv init --bare\nuv add pygame-ce\nuv run python hello_pygame.py\n```\n\n&lt;Callout type=\&quot;tip\&quot; title=\&quot;Confirm on the desktop before going headless\&quot;&gt;\nRun the app from a desktop session (VNC is fine) and confirm it appears fullscreen\nwith sound. If it fails here, it will also fail as a boot-time service, so resolve\nit before proceeding.\n&lt;/Callout&gt;\n\n## Step 6 — Easy approach: autostart in the desktop\n\nThe simplest autostart method is an XDG `.desktop` file in `~/.config/autostart`\nthat launches the app inside the desktop session. This works and is sufficient if\na desktop boot is acceptable.\n\nHowever, it boots the entire desktop first — compositor, panel, file manager,\nwallpaper — and then opens the app on top. This is slower, uses more memory, and\ncan briefly show desktop elements before the app takes over. It&#39;s fine, my kids\nquestioned it but otherwise didn&#39;t care. But it&#39;s much more slick to see it boot\nright to the radio app.\n\n## Step 7 — Boot straight into the app\n\nTwo approaches did not work on this hardware; they are documented first.\n\n&lt;Callout type=\&quot;warning\&quot; title=\&quot;Two dead ends\&quot;&gt;\n**SDL&#39;s `kmsdrm` driver will not render here.** The intended approach is to boot to\na text console and let SDL take the display directly via `kmsdrm`, with no desktop.\nOn this hardware SDL acquires the display, but because the panel runs under **fake\nKMS** (`vc4-fkms-v3d`), every frame flip is rejected (`drmModePageFlip` returns\n`EINVAL`), producing errors instead of output.\n\n**`pygame-ce`&#39;s SDL has no native Wayland backend.** Setting\n`SDL_VIDEODRIVER=wayland` errors with \&quot;wayland not available.\&quot; The app is an\n**X11** app.\n&lt;/Callout&gt;\n\nThe working approach keeps the app on its X11 render path via **XWayland** but\ndrops the desktop shell. Boot to a console, auto-log-in on the first virtual\nterminal, and launch a bare `labwc` compositor whose only job is to host the\napp — no panel, file manager, or greeter.\n\n### 7a. Autologin on tty1\n\nCreate a systemd drop-in so `pi` is logged in automatically on `tty1`:\n\n```bash\nsudo mkdir -p /etc/systemd/system/getty@tty1.service.d\nsudo tee /etc/systemd/system/getty@tty1.service.d/autologin.conf &gt;/dev/null &lt;&lt;&#39;EOF&#39;\n[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin pi --noclear %I $TERM\nEOF\n```\n\n### 7b. A launcher for the app\n\nThis script runs the app under XWayland, restarts it if it ever exits, and logs\nwhat happened:\n\n```bash\nmkdir -p ~/.local/bin\ntee ~/.local/bin/radio-kiosk.sh &gt;/dev/null &lt;&lt;&#39;EOF&#39;\n#!/bin/sh\nLOG=\&quot;$HOME/radio-kiosk.log\&quot;\nexport SDL_VIDEODRIVER=x11\nwhile :; do\n  echo \&quot;=== $(date -Is) start ===\&quot; &gt;&gt;\&quot;$LOG\&quot;\n  cd \&quot;$HOME/radio-app\&quot; &amp;&amp; uv run python hello_pygame.py &gt;&gt;\&quot;$LOG\&quot; 2&gt;&amp;1\n  echo \&quot;=== $(date -Is) exit rc=$? ===\&quot; &gt;&gt;\&quot;$LOG\&quot;\n  sleep 2\ndone\nEOF\nchmod +x ~/.local/bin/radio-kiosk.sh\n```\n\n### 7c. Start labwc on login — but only on the console\n\nAdd this to `~/.bash_profile`. The guard fires only on the physical console, so\nlogging in over SSH still gives a normal shell.\n\n```bash\ncat &gt;&gt; ~/.bash_profile &lt;&lt;&#39;EOF&#39;\n\n# Kiosk: on tty1 only, launch the app under a bare labwc compositor.\nif [ \&quot;$(tty)\&quot; = \&quot;/dev/tty1\&quot; ] &amp;&amp; [ -z \&quot;$DISPLAY\&quot; ] &amp;&amp; [ -z \&quot;$WAYLAND_DISPLAY\&quot; ] &amp;&amp; [ -z \&quot;$SSH_TTY\&quot; ]; then\n  exec labwc -S \&quot;$HOME/.local/bin/radio-kiosk.sh\&quot;\nfi\nEOF\n```\n\n&lt;Callout type=\&quot;note\&quot; title=\&quot;What the -S flag does\&quot;&gt;\n`labwc -S &lt;command&gt;` runs `&lt;command&gt;` on startup and shuts labwc down when it\nexits. Combined with the launcher&#39;s restart loop, the compositor exists only to\nhost the app.\n&lt;/Callout&gt;\n\n### 7d. Silence the desktop shell\n\nA bare `labwc` still reads the system autostart file, which launches the Raspberry\nPi panel and file manager. Override it with an empty user copy so only the app\nruns:\n\n```bash\nmkdir -p ~/.config/labwc\ntee ~/.config/labwc/autostart &gt;/dev/null &lt;&lt;&#39;EOF&#39;\n#!/bin/sh\n# Intentionally empty: suppress the desktop panel / file manager / xdg-autostart.\nexit 0\nEOF\nchmod +x ~/.config/labwc/autostart\n```\n\n### 7e. Hide the mouse pointer\n\nWith no mouse attached, labwc parks a cursor somewhere random on the screen and never\nmoves it. This is the compositor&#39;s cursor, so X-side tools like `unclutter`\ndon&#39;t affect it. The fix is to give labwc a fully transparent cursor theme:\n\n```bash\npython3 - &lt;&lt;&#39;PY&#39;\nimport struct, pathlib\ncur = pathlib.Path.home() / \&quot;.icons/blank/cursors\&quot;\ncur.mkdir(parents=True, exist_ok=True)\n# Minimal Xcursor file: a single 1x1 fully-transparent image.\nimg_hdr = [36, 0xfffd0002, 24, 1, 1, 1, 0, 0, 0]\nfile_hdr = b\&quot;Xcur\&quot; + struct.pack(\&quot;&lt;III\&quot;, 16, 0x00010000, 1)\ntoc = struct.pack(\&quot;&lt;III\&quot;, 0xfffd0002, 24, 28)\nbody = b\&quot;\&quot;.join(struct.pack(\&quot;&lt;I\&quot;, x) for x in img_hdr) + struct.pack(\&quot;&lt;I\&quot;, 0)\n(cur / \&quot;default\&quot;).write_bytes(file_hdr + toc + body)\nfor name in (\&quot;left_ptr\&quot;, \&quot;arrow\&quot;, \&quot;xterm\&quot;, \&quot;hand1\&quot;, \&quot;hand2\&quot;, \&quot;watch\&quot;, \&quot;cross\&quot;):\n    link = cur / name\n    if link.exists() or link.is_symlink():\n        link.unlink()\n    link.symlink_to(\&quot;default\&quot;)\n(cur.parent / \&quot;index.theme\&quot;).write_text(\&quot;[Icon Theme]\\nName=blank\\nInherits=core\\n\&quot;)\nprint(\&quot;wrote transparent cursor theme:\&quot;, cur)\nPY\n\n# tell labwc to use it\ntee ~/.config/labwc/environment &gt;/dev/null &lt;&lt;&#39;EOF&#39;\nXCURSOR_THEME=blank\nXCURSOR_SIZE=24\nEOF\n```\n\n### 7f. Flip the boot target\n\nSwitch the machine to boot to a console and stop autostarting the desktop and VNC.\nBoth stay installed and can be started manually:\n\n```bash\nsudo systemctl set-default multi-user.target\nsudo systemctl disable lightdm\nsudo systemctl disable wayvnc\n```\n\n&lt;Callout type=\&quot;danger\&quot; title=\&quot;Keep a way back in\&quot;&gt;\nThis step changes boot behavior, so keep a recovery path. SSH is independent of\nthe display, so even if the app never draws, you can log in over the network and\nrevert. The app owns `tty1` only — a login prompt stays available on **tty2**\n(&lt;kbd&gt;Ctrl&lt;/kbd&gt;+&lt;kbd&gt;Alt&lt;/kbd&gt;+&lt;kbd&gt;F2&lt;/kbd&gt; with a keyboard attached), so a\nbroken WiFi connection is not a lockout. Do not mask all the gettys.\n&lt;/Callout&gt;\n\nReboot:\n\n```bash\nsudo reboot\n```\n\nIt comes up on a console briefly and then lands directly in the app, fullscreen,\nwith no pointer. Confirm it is running from another machine:\n\n```bash\nssh pi@radio.local &#39;systemctl get-default; pgrep -a labwc&#39;\n```\n\n&lt;Callout type=\&quot;tip\&quot; title=\&quot;Reverting to a desktop boot\&quot;&gt;\nTo revert: `sudo systemctl set-default graphical.target`,\n`sudo systemctl enable lightdm`, remove the `~/.bash_profile` guard and the\n`getty@tty1` drop-in, and reboot.\n&lt;/Callout&gt;\n\n## Step 8 — Safe shutdown\n\nThe GPi Case 2&#39;s physical power switch cuts power immediately by default, which is\nthe mid-write power loss that corrupts SD cards. The case exposes the switch state\non a GPIO pin so the Pi can shut down cleanly first. Monitor script:\n\n```python\n# /home/pi/scripts/safe_shutdown.py\nimport os\nfrom signal import pause\nfrom gpiozero import Button, DigitalOutputDevice\n\n# GPIO 27: \&quot;keep-alive\&quot; — drive HIGH on start so the case keeps power on.\npower_en = DigitalOutputDevice(27, initial_value=True)\n\n# GPIO 26: the case pulls this LOW when the switch is flipped off.\nshutdown_switch = Button(26, pull_up=True, bounce_time=0.1)\n\ndef on_shutdown_request():\n    print(\&quot;Power switch off — shutting down cleanly...\&quot;)\n    os.system(\&quot;sudo shutdown -h now\&quot;)\n\nshutdown_switch.when_pressed = on_shutdown_request\n\nprint(\&quot;Safe-shutdown monitor running (keep-alive on GPIO 27, trigger on GPIO 26).\&quot;)\npause()\n```\n\nRun it as a system service:\n\n```bash\nsudo tee /etc/systemd/system/gpicase-shutdown.service &gt;/dev/null &lt;&lt;&#39;EOF&#39;\n[Unit]\nDescription=GPi Case 2 safe-shutdown monitor\nAfter=multi-user.target\n\n[Service]\nType=simple\nExecStart=/usr/bin/python3 /home/pi/scripts/safe_shutdown.py\nRestart=always\nUser=root\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\nsudo systemctl daemon-reload\nsudo systemctl enable --now gpicase-shutdown.service\nsystemctl status gpicase-shutdown.service\n```\n\n&lt;Callout type=\&quot;note\&quot; title=\&quot;Pin numbers are hardware-specific\&quot;&gt;\nGPIO 26/27 match this GPi Case 2 wiring. For a different revision or case, check\nthe manufacturer&#39;s docs. The pattern is the same: drive a keep-alive pin high,\nwatch a trigger pin for the off signal.\n&lt;/Callout&gt;\n\nThe GPi case also has a sleep button. I don&#39;t know if it&#39;s exactly sleep, but the\ndefault behavior seems to turn off the screen, blink the power LED, but keep the\napp running (e.g., music keeps playing). You can probably intercept this as well\nto do something special, I didn&#39;t bother.\n\n## Optional — Shaving the boot time\n\nConsole boot and remove unnecessary startup services. Even trimmed down, it still takes\na good 15-20 seconds or so to start the app. It&#39;s not the end of the world, my kids\nlearned to be patient. (Less slow before trimming the fat, when it took almost a minute\nto boot and open the app.) Take a look at what&#39;s slowing you down:\n\n```bash\nsystemd-analyze\nsystemd-analyze blame | head -20\nsystemd-analyze critical-chain\n```\n\nI do this on occasion because sometimes a rogue update adds something silly and unnecessary.\nI disabled a lot of services, but the most impactful was probably the default wait for\nnetwork connection at boot. Definitely remove that one unless you reaaalllyyy need a network\nshare available at boot.\n\nSome ideas:\n\n- Don&#39;t wait for network: `sudo systemctl mask systemd-networkd-wait-online.service`\n- Disable services unused on an offline appliance — Bluetooth, printing (`cups`),\n  modem manager: `sudo systemctl disable bluetooth cups ModemManager`.\n- Drop `plymouth` if the boot splash is not needed.\n\n## The result &lt;a name=\&quot;final-result\&quot; /&gt;\n\nThe result is a standard Linux machine that behaves like an application kiosk. It will\nboot directly into your pygame application now. Here&#39;s it booting into mine!\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/kidsplay/kidsplay.mp4\&quot;\n  caption=\&quot;VIDEO: powering on the device and navigating music, an audiobook, and photos — the single-purpose interface.\&quot;\n/&gt;\n\nI hope this was useful.\n&quot;],&quot;collection&quot;:[0,&quot;blog&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Hardware for building a media player safe for kids&quot;],&quot;summary&quot;:[0,&quot;No ads, no video, no flashing lights, no infinite scroll, no unapproved content.&quot;],&quot;date&quot;:[3,&quot;2026-07-02T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;raspberry-pi&quot;],[0,&quot;cm4&quot;],[0,&quot;gpi-case-2&quot;],[0,&quot;pygame&quot;],[0,&quot;linux&quot;],[0,&quot;kids&quot;],[0,&quot;diy&quot;]]],&quot;draft&quot;:[0,false]}],&quot;render&quot;:[0,null]}]]]}" ssr="" client="load" opts="{&quot;name&quot;:&quot;SearchCollection&quot;,&quot;value&quot;:true}" await-children=""><div data-hk="s00000" class="grid grid-cols-1 sm:grid-cols-3 gap-6"><div class="col-span-3 sm:col-span-1"><div class="sticky top-24 mt-7"><!--$--><div data-hk="s000010" class="relative"><svg class="absolute size-6 left-2 top-[0.45rem] stroke-neutral-400 dark:stroke-neutral-500 pointer-events-none"><use href="/ui.svg#search"></use></svg><input name="search" type="text" value="" autocomplete="off" spellcheck="false" placeholder="Search posts" class="w-full px-10 py-1.5 rounded outline-none placeholder-neutral-400 dark:placeholder-neutral-500 text-black dark:text-white bg-black/5 dark:bg-white/10 hover:bg-black/10 hover:dark:bg-white/15 focus:bg-black/10 focus:dark:bg-white/15 border border-black/10 dark:border-white/10 focus:border-black/40 focus:dark:border-white/40"><!--$--><!--/--></div><!--/--><div class="relative flex flex-row justify-between w-full"><p class="text-sm font-semibold uppercase my-4 text-black dark:text-white">Tags</p><!--$--><!--/--></div><ul class="flex flex-wrap sm:flex-col gap-1.5"><li data-hk="s000020" class="sm:w-full"><button class="w-full px-2 py-1 rounded flex gap-2 items-center bg-black/5 dark:bg-white/10 hover:bg-black/10 hover:dark:bg-white/15 transition-colors duration-300 ease-in-out"><svg class="shrink-0 size-5 fill-black/50 dark:fill-white/50 transition-colors duration-300 ease-in-out"><use href="/ui.svg#square" class="block"></use><use href="/ui.svg#square-check" class="hidden"></use></svg><span class="truncate block min-w-0 pt-[2px]">cm4</span></button></li><li data-hk="s000021" class="sm:w-full"><button class="w-full px-2 py-1 rounded flex gap-2 items-center bg-
