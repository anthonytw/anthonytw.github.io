vision&quot;],[0,&quot;control&quot;],[0,&quot;critical-care&quot;],[0,&quot;data-science&quot;],[0,&quot;data-visualization&quot;],[0,&quot;deep-learning&quot;],[0,&quot;embedded&quot;],[0,&quot;energy-harvesting&quot;],[0,&quot;feeding&quot;],[0,&quot;hardware&quot;],[0,&quot;hemorrhage&quot;],[0,&quot;HRI&quot;],[0,&quot;IMU&quot;],[0,&quot;machine-learning&quot;],[0,&quot;materials-science&quot;],[0,&quot;medical&quot;],[0,&quot;medical-robotics&quot;],[0,&quot;mentoring&quot;],[0,&quot;nuclear-detection&quot;],[0,&quot;open-source&quot;],[0,&quot;OpenCV&quot;],[0,&quot;PPG&quot;],[0,&quot;real-time&quot;],[0,&quot;RISS&quot;],[0,&quot;sensing&quot;],[0,&quot;signal-processing&quot;],[0,&quot;SMA&quot;],[0,&quot;social-good&quot;],[0,&quot;soft-robotics&quot;],[0,&quot;strain-sensing&quot;],[0,&quot;test-equipment&quot;],[0,&quot;thermoelectric&quot;],[0,&quot;tooling&quot;],[0,&quot;trajectory-optimization&quot;],[0,&quot;video-processing&quot;],[0,&quot;wearable&quot;]]],&quot;data&quot;:[1,[[0,{&quot;id&quot;:[0,&quot;waffle.mdx&quot;],&quot;slug&quot;:[0,&quot;waffle&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Video from \&quot;../../components/Video.astro\&quot;;\n\nI want to highlight some really amazing work led by [Akhil Padmanabha](https://akhilpadmanabha.github.io/) and [Jessie Yuan](https://jessie-yuan.github.io/) at Carnegie Mellon University that I was tangentially involved in.\n**WAFFLE** (Wearable Approach For Feeding with LEarned Bite Timing) won Best Paper at the 21st ACM/IEEE International Conference on Human-Robot Interaction (HRI &#39;26) in Edinburgh, Scotland.\nThe work, in collaboration with Cornell University, addresses one of the core challenges in robot-assisted feeding: knowing *when* to offer the next bite.\n\nThe full paper and project videos are available at the [WAFFLE project page](https://sites.google.com/view/bitetiming/) and via [ACM](https://dl.acm.org/doi/10.1145/3757279.3785560) [@padmanabha2026waffle].\n\n## The problem\n\nAround 3.5 million people in the United States need assistance with feeding.\nRobotic feeding systems can reduce caregiver workload and restore independence, but their widespread adoption has been limited in part because they struggle with *bite timing* — deciding the right moment to move food toward the user&#39;s mouth.\n\nMost systems either rely on fixed intervals (too inflexible) or require the user to explicitly signal readiness by opening their mouth (disruptive, especially in conversation).\nWhat caregivers actually do is watch for natural cues: chewing winding down, a pause in conversation, a small head movement toward the spoon.\n\n## The approach\n\nWAFFLE captures exactly those cues using two lightweight wearables:\n\n- a **[Posey IMU](/research/posey) mounted on a glasses frame**, tracking head movements and chewing vibrations; and\n- a **throat contact microphone** worn around the neck, detecting swallowing and vocal activity without recording ambient sound.\n\nA supervised regression model takes 1-second windows of these sensor signals and predicts the time until the user is ready for the next bite.\nA user-adjustable *assertiveness threshold* converts the continuous prediction into a simple stop/proceed command for the robot, letting users tune how proactively the robot feeds them.\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/waffle/waffle.mp4\&quot;\n  caption=\&quot;Video 1. WAFFLE overview — system design, data collection, and evaluation studies. Original video on the &lt;a target=&#39;_blank&#39; href=&#39;https://sites.google.com/view/bitetiming/&#39; rel=&#39;noopener noreferrer&#39;&gt;WAFFLE project page&lt;/a&gt;.\&quot;\n/&gt;\n\n## Key results\n\nThe system was evaluated across three phases involving 31 participants total, including two people with motor impairments using the system in their own homes.\n\n- **93% of participants** found WAFFLE&#39;s bite timing appropriate overall, versus 87% for Mouth Open and 70% for Fixed Interval.\n- In individual dining, WAFFLE matched the Mouth Open baseline on feeling of control while requiring significantly **less physical workload**.\n- In social dining, WAFFLE statistically outperformed Mouth Open on *not disrupting conversation* and *natural conversation flow*.\n- **87% of participants ranked WAFFLE first** for individual dining; 67% ranked it first for social dining.\n- When asked which method most resembled a human caregiver, **9 out of 15 participants chose WAFFLE**.\n- One participant with motor impairments said it was *\&quot;way better than they [caregivers] would do it,\&quot;* noting the system naturally paused when she was still chewing without needing to be told.\n\nThe system generalized across two different robot platforms (Obi and a Kinova 7DOF arm), varied robot positioning and feeding trajectories, multiple foods, and both individual and social dining contexts.\n\n## How Posey helped\n\nThe IMU boards at the heart of WAFFLE use the [Posey](/research/posey) sensor hardware and firmware platform that I designed and fabricated while in the Soft Machines Lab at CMU.\nEach sensor integrates a microcontroller, IMU, lithium-polymer battery, and Bluetooth antenna into a compact, research-ready package small enough to mount on glasses frames or inside 3D-printed earbuds.\n\n&lt;ImageGallery\n  equalHeights\n  images={[\n    { src: \&quot;/assets/projects/posey_suite.png\&quot;, alt: \&quot;Figure 1: The Posey sensor suite — hub (top), ring (bottom left), and watch (bottom right). The glasses-mounted and earbud form factors used in WAFFLE share the same core design.\&quot; },\n    { src: \&quot;/assets/projects/posey_on_hand.png\&quot;, alt: \&quot;Figure 2: Posey ring shown on a finger, giving a sense of the compact scale of the sensor boards used in WAFFLE.\&quot; },\n  ]}\n/&gt;\n\nFor WAFFLE&#39;s data collection study, four Posey boards were worn simultaneously — two on the glasses frame and two embedded in earbuds — streaming 9-DoF inertial data at 200 Hz over BLE.\nFor their research, it turned out just one was enough to capture the necessary cues, but the extra sensors allowed them to explore which locations and modalities were most informative for bite timing.\nI also built the BLE hub to aggregate all sensor streams reliably, which was a prerequisite for running multi-sensor studies across many participants without the latency and connectivity issues that plague commodity laptop BLE stacks.\n\nThe Posey hardware, firmware, and command-line tools are fully open-source and available on [GitHub](https://github.com/SML-Posey).\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;WAFFLE: Wearable bite timing for robot-assisted feeding&quot;],&quot;summary&quot;:[0,&quot;Best paper at HRI &#39;26 — a wearable system for robot-assisted feeding that reads natural cues like chewing and head movement to decide when to offer the next bite, built on custom Posey IMU hardware.&quot;],&quot;date&quot;:[3,&quot;2026-03-16T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;wearable&quot;],[0,&quot;IMU&quot;],[0,&quot;assistive-robotics&quot;],[0,&quot;HRI&quot;],[0,&quot;feeding&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_waffle.gif&quot;],&quot;role&quot;:[0,&quot;Contributor&quot;],&quot;repoUrl&quot;:[0,&quot;https://github.com/SML-Posey&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;notch.mdx&quot;],&quot;slug&quot;:[0,&quot;notch&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Figure from \&quot;../../components/Figure.astro\&quot;;\nimport Video from \&quot;../../components/Video.astro\&quot;;\n\nDistributed, multi-modal sensor networks are important in soft robotics for tasks like closed-loop control, state estimation, and large-area tactile sensing.\nHowever, soft systems and sensors typically lack the compute power and multiplexing capabilities of rigid systems, making sensor integration more cumbersom.\nFurther, to deal with the more complicated state and dynamics compared with rigid devices, they typically need many more sensors to boot.\n\nIn this work, we introduced an approach that encapsulates resistive or capacitive soft-material sensors in variable-frequency notch filters, enabling distributed strain sensing over a shared bus with minimal wiring and automatic, high-fidelity sensor response decoupling, all without requiring complicated multiplexing or compensation approaches to tune, reconfigure, and disambigute sensors.\nEach sensor node is assigned a unique spectral band, and the entire network can be interrogated with a single frequency sweep.\nThe result is a framework that supports sensor isolation, easy network reconfiguration, and heterogeneous sensing without requiring recalibration when sensors are added or removed.\nIt works with sensors that vary their resistance or capacitance with the target signal.\nWe developed the theory for both and demonstrated our findings using networks of capacitive strain gauges.\n\n&lt;Figure\n  src=\&quot;/assets/projects/sencel/sencel_front.jpg\&quot;\n  caption=\&quot;Figure 1. Direct-ink-write (DIW) printed multi-node soft, stretchable sensor array. ©2025 IEEE†\&quot;\n/&gt;\n\n&lt;sup&gt;†&lt;/sup&gt;**Copyright Notice:** Figures and videos designated with **©2025 IEEE** are reprinted, with permission, from Wertz, A., Shah, D., &amp; Majidi, C., \&quot;Soft Transducers with Notch Filters for Spatially-Distributed Strain Sensing\&quot; *IEEE Sensors Journal*, Oct 2025 [@wertz2025soft].\nAll other site content, homelab tutorials, and unmarked media are **© 2025 Anthony Wertz** and provided for educational purposes.\nI will try to call out the additional fun bonus material that may not have made it to a publication or somewhere else on this site.\n\n## Approach\n\nA notch (band-reject) filter attenuates a narrow frequency band determined by its passive component values.\nBy replacing one of those passive components with a strain-sensitive element, such as a soft capacitor, the notch frequency becomes a function of the sensing target (in the case of strain gauges, the applied strain).\nEach sensor on the network is designed to operate in a different frequency band, so their responses can be independently detected from a single chirp input.\n\nWhile we look at both twin-T and a Bainter notch filters in the supplemental materials, in the paper we mainly focused on the Bainter notch topology, which offers several advantages:\n\n- **Robust notch depth**: The zero quality factor $Q_z$ is proportional to the op-amp gain, so the notch depth is largely unaffected by component tolerances.\n- **Single sensing element**: Only one strain-sensitive capacitor or resistor is needed per node, simplifying fabrication.\n- **Tunable sensitivity**: Fixed resistors and capacitors can be added in series or parallel to the sensing element to independently tune the sensitivity and operating frequency.\n- **Accessible frequencies**: Appropriate component selection yields notch frequencies in the low kilohertz range, easing data acquisition requirements compared to passive LC designs operating at hundreds of kilohertz to megahertz.\n\n&lt;Figure\n  src=\&quot;/assets/projects/sencel/schem-bainter.png\&quot;\n  alt=\&quot;Bainter notch filter schematic\&quot;\n  caption=\&quot;Figure 2. Bainter notch filter topology. The strain-responsive component (blue) and tuning elements (orange) are highlighted. ©2025 IEEE.\&quot;\n/&gt;\n\n## Device fabrication\n\nStretchable parallel-plate capacitors were fabricated by patterning oxidized eutectic gallium-indium (OGaIn) liquid metal paste electrodes onto double-sided VHB tape using laser-cut stencils.\nA small notch filter PCB was pressed onto the patterned VHB and connected to the electrodes using a conductive biphasic liquid metal ink.\nThe assembled devices could be stretched to over 200% strain during operation.\n\n&lt;ImageGallery\n  equalHeights\n  images={[\n    { src: \&quot;/assets/projects/sencel/twint_photo_nostrain.jpg\&quot;, alt: \&quot;Figure 3. Fabricated twin-T sensor at zero strain. ©2025 IEEE\&quot; },\n    { src: \&quot;/assets/projects/sencel/twint_photo_highstrain.jpg\&quot;, alt: \&quot;Figure 4. The same twin-T sensor stretched to approximately 200% strain. ©2025 IEEE\&quot; },\n    { src: \&quot;/assets/projects/sencel/bainter_photo_nostrain.jpg\&quot;, alt: \&quot;Figure 5. Fabricated Bainter sensor at zero strain. ©2025 IEEE\&quot; },\n    { src: \&quot;/assets/projects/sencel/bainter_photo_highstrain.jpg\&quot;, alt: \&quot;Figure 6. The same Bainter sensor stretched to approximately 200% strain. ©2025 IEEE\&quot; },\n  ]}\n  columns={2}\n/&gt;\n\n**Bonus:** Although not presented in much detail in the published manuscript, the sensor network from the figure above was fabricated in in three stages using a direct-ink-write (DIW) Voltera V-One printer.\nHere&#39;s a nifty video part of that process. Ultimately, because of the very low capacitance we were able to get from the printed capacitors, the twin-T didn&#39;t function well in multi-node configurations.\nWith the Bainter, fabrication didn&#39;t need to be as precise because there was only one capacitor to fabricate, and we did not see the same downstream attenuation as we did with the very low capacitance (and thus very high resistance) twin-T filters.\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/sencel/print_twint.mp4\&quot;\n  caption=\&quot;Video 1. Printing a three-node twin-T sensor array with the Voltera V-One (10x speed).\&quot;\n/&gt;\n\n## Effective gauge factor\n\nWe derived the effective gauge factor, indicating the frequency response to strain, for several configurations.\nFor the particular case of directly replacing the tuning filter capacitor in the Bainter filter with a strain-sensitive component, the effective gauge factor is:\n\n$$\nG_f = \\frac{1}{\\varepsilon} \\cdot \\frac{1 - \\sqrt{G_c \\varepsilon + 1}}{\\sqrt{G_c \\varepsilon + 1}}\n$$\n\nwhere $G_c$ is the capacitive gauge factor and $\\varepsilon$ is the strain.\nAssuming a positive $G_c$, this nonlinear relationship shows the sensor has higher sensitivity at lower strains and decreasing sensitivity at higher strains.\nImportantly, fixed components can be added in parallel or series to tune the sensitivity independently of the sensor&#39;s native gauge factor, giving the designer flexibility without changing the sensing element itself.\nThe shapes of these response curves can differ quite a bit depending on the gauge factors (especially the sign) and whether or not you replace one or both of the capacitive and resistive filter elements.\nIn the supplemental material we derive these relationships for both the twin-T and Bainter filters.\n\n## Single-sensor validation\n\nThe sensor was cyclically strained to 100% on an Instron and the notch frequency tracked via logarithmic chirps from 1 to 100 kHz.\nThe sensor response was measured with a Salae Logic 8, and the measured frequency shift was fit to the derived model using the Levenberg-Marquardt algorithm, yielding a near-perfect fit with less than 0.5% strain estimation error.\nThe fitted gauge factor was $G = 0.95 \\pm 0.05$, close to the expected $G = 1$ for a parallel-plate capacitor.\n\n&lt;ImageGallery\n  equalHeights\n  images={[\n    { src: \&quot;/assets/projects/sencel/instron_setup.jpg\&quot;, alt: \&quot;Figure 7. Twin-T sensor in Instron attached to data collection electronics.\&quot; },\n    { src: \&quot;/assets/projects/sencel/freq_shift_and_strain_fit.png\&quot;, alt: \&quot;Figure 8. Measured strain (blue) and sensor frequency shift (red) over five 100% strain cycles. ©2025 IEEE.\&quot; },\n  ]}\n/&gt;\n\nHere is a video of the twin-T sensor characterization using an Instron to measure tensile stress and strain.\nWe used the twin-T design here, so the downstream attenuation due to the high-resistance network is very apparent in the transfer function.\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/sencel/sencel_characterization.mp4\&quot;\n  caption=\&quot;Video 2. Material characterization inset with the filter response. ©2025 IEEE.\&quot;\n/&gt;\n\n## Multi-sensor demonstration\n\nA key strength of notch filter encapsulation is that sensors on the same network are decoupled from one another.\nTo demonstrate this, three Bainter notch sensors with different zero-strain frequencies were placed on a single five-wire bus.\nAll three notches were clearly detected from a single chirp.\nThe center sensor was then progressively strained, shifting its notch frequency down until it overlapped with and passed through the first sensor&#39;s notch, with no adverse effect on the network response.\n\n&lt;Figure\n  src=\&quot;/assets/projects/sencel/sensor_decoupling.png\&quot;\n  alt=\&quot;Multi-sensor notch detection\&quot;\n  caption=\&quot;Figure 8. Three-sensor network response at rest (top), small strain (middle), and large strain (bottom). The center sensor&#39;s notch shifts through the first sensor&#39;s frequency without interference. ©2025 IEEE.\&quot;\n/&gt;\n\nBecause each sensor node is buffered and spectrally isolated, networks can be reconfigured by simply connecting or disconnecting sensors without requiring recalibration or compensation algorithms.\nHeterogeneous networks mixing different sensor types (e.g., strain, temperature, force) are also supported, so long as each sensor transduces its signal of interest to a change in resistance or capacitance.\n\n**Bonus:** We discuss the theoretical operational limitations below, but here are three Bainter nodes operating together between 1-100Hz sampling frequencies. We see even though the higher frequency measurements are noisier, it is still easy to pick out a good estimation of the notch frequency and, indirectly, the strain in this case.\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/sencel/network_1Hz.mp4\&quot;\n  caption=\&quot;Video 2. Multi-sensor (Bainter) strain tracking with 1Hz sampling.\&quot;\n/&gt;\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/sencel/network_10Hz.mp4\&quot;\n  caption=\&quot;Video 3. Multi-sensor (Bainter) strain tracking with 10Hz sampling.\&quot;\n/&gt;\n\n&lt;Video\n  src=\&quot;https://pub-255c7a1afae74083b45fd613f73cb6ea.r2.dev/sencel/network_100Hz.mp4\&quot;\n  caption=\&quot;Video 4. Multi-sensor (Bainter) strain tracking with 100Hz sampling.\&quot;\n/&gt;\n\n## Network design and theoretical limits\n\nWe derived design guidelines for building sensor networks, including procedures for sequential sensor placement and expressions bounding the maximum number of sensors in a given bandwidth.\nFor a homogeneous network, the number of sensors that can fit in a bandwidth $[f_L, f_H]$ is:\n\n$$\nN = \\left\\lfloor \\frac{\\log(f_L / f_H)}{\\log(1 + \\Gamma_1)} \\right\\rfloor\n$$\n\nwhere $\\Gamma_1$ is determined by the maximum strain and gauge factor.\nWith a margin based on the 3 dB bandwidth, this becomes:\n\n$$\nN_\\alpha = \\left\\lfloor \\frac{\\log(f_L / f_H) - \\log(1 + \\alpha)}{\\log(1 + \\Gamma_1) - \\log(1 + \\alpha)} \\right\\rfloor\n$$\n\nwhere $\\alpha = 1/(2Q)$.\nIn the limiting case of binary detection (one resolvable frequency point per sensor), a 1–100 kHz bandwidth can theoretically support hundreds to thousands of sensors depending on the quality factor and frequency resolution.\n\n&lt;Figure\n  src=\&quot;/assets/projects/sencel/N_sensor_limits_annotated.png\&quot;\n  alt=\&quot;Theoretical maximum sensor count\&quot;\n  caption=\&quot;Figure 9. Theoretical maximum sensor count vs. frequency resolution for a 1–100 kHz bandwidth, plotted for several Q values. ©2025 IEEE.\&quot;\n/&gt;\n\n\n## Summary\n\nThis work shows that encapsulating soft sensors in notch filters is a practical approach to distributed sensing with minimal wiring, easy reconfiguration, and tunable sensitivity.\nThe framework is agnostic to the particular notch topology and sensing modality, making it broadly applicable to electronic skins, wearable devices, and soft robots.\nFor a deeper look at the theory, including twin-T notch analysis, gauge factor derivations for all configurations, and detailed network design examples, see the manuscript and supplementary material.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Distributed strain sensing with notch filters&quot;],&quot;summary&quot;:[0,&quot;Soft sensor arrays using variable-frequency notch filters for spatially-distributed sensing with minimal wiring.&quot;],&quot;date&quot;:[3,&quot;2025-10-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;soft-robotics&quot;],[0,&quot;sensing&quot;],[0,&quot;analog-circuits&quot;],[0,&quot;strain-sensing&quot;],[0,&quot;wearable&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_sencel.gif&quot;],&quot;role&quot;:[0,&quot;Researcher&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;tegsense.mdx&quot;],&quot;slug&quot;:[0,&quot;tegsense&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Figure from \&quot;../../components/Figure.astro\&quot;;\nimport Video from \&quot;../../components/Video.astro\&quot;;\n\nContinuous biometric monitoring that doesn&#39;t require frequent device or battery removal for recharging is of great interest to the medical community for improving patient care.\nIn this work, we were very interested in testing how far we can push the boundaries of battery-free technologies, that is, those that fully operate using only energy harvested from their surroundings.\nHere we implemented a fully body-heat-powered device that periodically captures red and infrared reflectance waveforms and sends this data out over a Bluetooth Low Energy (BLE) link.\nSee some highlights in the gallery below, and please read on.\nNote that this project is fully released open-source and the paper is open-access.\nThe TEGSense hardware, firmware, and data logger can be found on [GitHub](https://github.com/TEGSense).\nIn particular, [PPGView](https://github.com/TEGSense/ppgview) might be especially useful to anyone looking for an easy way to configure and stream waveform data from a MAX30101 PPG sensor.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/tegsense_summary.jpg\&quot;, alt: \&quot;Figure 1: A summary of the TEGSense project. See paper for details.\&quot; },\n    { src: \&quot;/assets/projects/tegsense_teg.jpg\&quot;, alt: \&quot;Figure 2. Some views of the flexible thermoelectric devices. See paper for details.\&quot; },\n    { src: \&quot;/assets/projects/ss_tegsense.jpg\&quot;, alt: \&quot;Figure 3: PPGView, a web-based UI for real-time data streaming and sensor configuration for the MAX30101.\&quot; },\n  ]}\n/&gt;\n\nI had the great pleasure of collaborating with [Mason Zadan](https://www.masonzadan.com/) to build a fully human-powered, battery-free, BLE-enabled photoplethysmograph (PPG).\nMason has done some really excellent work designing and fabricating soft, flexible thermoelectric devices, which you can read about in his previous work [@zadan2022liquid] or check out his website for some cool videos.\nThe soft, compliant nature of the flexible TEGs make them better able to conform to the body and transduce heat to electricity.\nIn our more recent work [@zadan2024tegsense], we used his improved devices as thermoelectric generators (TEGs) to fully power a biometric sensor.\nFigure 1 gives a high-level overview of the study, where a TEG array (a) is connected to a sensor board (b) to continuously recharge a capacitor bank (c) and collect PPG waveform data to send out over BLE (d).\nSome different views of the thermoelectric device are shown in figure 2, highlighting its flexibily.\nWe capture this data and configure the MAX30101 sensor using the PPGView software, seen in figure 3.\nBelow is a video explaining the study.\n\n&lt;Video\n  src=\&quot;https://masonzadan.com/images/SI Video 2.mp4\&quot;\n  poster=\&quot;https://masonzadan.com/images/TEH3.jpg\&quot;\n  caption=\&quot;Video 1. Supplemental video explaining the TEGSense study. See Mason&#39;s website.\&quot;\n/&gt;\n\nI designed a sensor board, which we call TEGSense, that steps up the low voltage output from a TEG (or TEG array, in this case) using an ultra low-voltage boost converter to charge a capacitor bank.\nOnce the capacitors are fully charged to about 4.1V, a hysteretic switch enables the microcontroller and PPG sensor power supplies so they may start collecting waveform data to be shipped out over BLE.\nThe hysteretic switch will disable the power supplies if the voltage ever drops below 3.3V to allow full recharging back to 4.1V.\nOtherwise, after sending a three second waveform, the device sleeps for a period of time while the capacitors recharge.\nFigure 4 shows a schematic of the electronics.\n\n&lt;Figure\n  src=\&quot;/assets/projects/tegsense_schematic_v4.jpg\&quot;\n  alt=\&quot;TEGSense hardware schematic\&quot;\n  caption=\&quot;Figure 4. TEGSense rigid prototype schematic (v4).\&quot;\n/&gt;\n\nThe board used for collection in the paper is an older revision.\nFigures 5-7 below show an updated design (the same shown in the schematic in figure 4) meant to be implemented as flexible printed circuit boards (PCBs) and a bit more compact.\nFurther, FFC and other small connectors are replaced with slightly larger contacts compatible with direct ink write (DIW) printed circuits.\nFuture iterations of the TEGSense device can be better integrated into wearables this way.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/tegsense_flex.png\&quot;, alt: \&quot;Figure 5. TEGSense v4 flex board for compatibility with printed conductors.\&quot; },\n    { src: \&quot;/assets/projects/tegsense_flex_spo2.png\&quot;, alt: \&quot;Figure 6. Flex SpO2 board.\&quot; },\n    { src: \&quot;/assets/projects/tegsense_flex_cap.png\&quot;, alt: \&quot;Figure 7. Flex capacitor bank.\&quot; },\n  ]}\n  columns={3}\n/&gt;\n\nFor a more detailed look, please check out our paper [@zadan2024tegsense] and our work on [GitHub](https://github.com/TEGSense).\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;TEG-powered, battery-free PPG sensing&quot;],&quot;summary&quot;:[0,&quot;Battery-free photoplethysmograph (PPG) powered by body heat captured using flexible thermoelectric generators (TEGs).&quot;],&quot;date&quot;:[3,&quot;2024-06-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;energy-harvesting&quot;],[0,&quot;wearable&quot;],[0,&quot;PPG&quot;],[0,&quot;BLE&quot;],[0,&quot;thermoelectric&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_tegsense.gif&quot;],&quot;role&quot;:[0,&quot;Researcher&quot;],&quot;repoUrl&quot;:[0,&quot;https://github.com/TEGSense&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;ionm.mdx&quot;],&quot;slug&quot;:[0,&quot;ionm&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Figure from \&quot;../../components/Figure.astro\&quot;;\n\nAs high-power, high-voltage electronics become increasingly prevalent, in electric vehicle powertrains for example, understanding the degradation of materials in close proximity to high-voltage fields is crucial.\nThis understudied scenario and associated failure modes are quickly moving under the spotlight as industries, especially automotive, transition to electric power, which requires high voltages for fast charging and power delivery.\nAn electric vehicle might have an 800V power train, for example.\nI designed a test apparatus to investigate the effects of nearby high-voltage potentials on material properties as part of a semester research and development internship at [Arieca](https://arieca.com), a developer of high-performance thermal interface materials (TIMs).\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/ionm_enclosure.png\&quot;, alt: \&quot;Figure 1: Ion migration test apparatus.\&quot; },\n    { src: \&quot;/assets/projects/ionm_hardware.png\&quot;, alt: \&quot;Figure 2: Internal device electronics.\&quot; },\n    { src: \&quot;/assets/projects/ionm_frontend.png\&quot;, alt: \&quot;Figure 3: Real-time logging, visualization, and control interface.\&quot; },\n  ]}\n/&gt;\n\nWe wanted to investigate the reliability and uncover failure modes of electrically or thermally conductive polymers, including liquid metal inks and Arieca&#39;s TIMs, in the presence of a high-voltage electric field.\nThe primary driver of this endeavor was to understand how ion migration in particular, initiated by the large voltage potentials, may cause material degradation.\nTo that end, I designed and implemented a test apparatus to study the effects.\nThis included custom printed circuit boards (PCBs) for logic, power delivery, and test samples, the device enclosure and sample holder, and a user interface.\nAt a high level, the device consists of:\n\n- a controllable high-voltage electrode to put sample materials near a high-voltage potential (configurable to 0-6kV);\n- a controllable voltage, high-current DC power supply for biasing insulating materials or running current through conductive materials (controllable to 0-6V, 0-10A);\n- a modular interface for the test electronics front-end;\n- custom logic boards for interfacing with the module, controlling the high voltage, and interfacing with the controls on the enclosure;\n- the device enclosure and sample holder; and\n- a web-based real-time logging, visualization, and control interface.\n\nThe device firmware was developed on the Arduino platform and supports real-time sensing and command inputs.\nA web-based user interface was developed to visualize experimental data in real-time, log experimental data, and control the operation of the device.\nFigure 1 in the gallery shows the enclosure design and sample holder on top.\nIn figure 2 you can see a birds-eye view of the assembled hardware inside.\nA view of the web interface can be seen in figure 3.\n\nThe first iteration of the design had some problems to address.\nAlthough most of the issues were resolved with some rework, some of the functionality was lost in the process and we wanted to ensure the design would be reliable.\nThe second iteration was a great improvement, incorporating bug fixes along with extending capabilities.\nThe most notable extension was the modularization of the sample under test (SUT) module.\nIn this case, the SUT module allows for the control of a DC-DC buck converter to provide 0-6V bias on the SUT and sink up to 10A current.\nWith the modular interface, future designs can extend capability further without requiring a complete board redesign.\nThe second revision of the apparatus was finished toward the end of the internship, so unfortunately we were not able to conduct extensive testing prior to my departure.\n\nWe were able to capture a few interesting failures on video.\nFigure 4 shows a thin sample of oxidized gallium-indium liquid metal (OGaIn) with a high current density passing through it.\nThe material quickly overheats and likely vaporizes the liquid metal, a very extreme and highly undesirable failure mode.\nFigure 5 shows a similar trace undergoing a more gradual degradation due to a high but more reasonable current density.\nVisually, the surface of the liquid metal begins to exhibit mottling, with areas of decreased reflectivity appearing first at the narrowest point of the trace where the temperature is likely highest and then propagating outward toward either end.\nThis may be due to increased oxidation due to the elevated temperature.\nHowever, in these cases we were unable to investigate the phenomena further due to time constraints.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/ionm_trace_burn.gif\&quot;, alt: \&quot;Figure 4. Rapid liquid metal trace degradation under very high current density.\&quot; },\n    { src: \&quot;/assets/projects/ionm_trace_lm.gif\&quot;, alt: \&quot;Figure 5. Visual changes due to high current density.\&quot; },\n  ]}\n  columns={2}\n/&gt;\n\nArieca will continue to push forward on ion migration degradation characterization to better understand how their materials may fail when deployed in applications requiring close proximity to high-voltage supplies, especially in electric vehicles.\nIn this way, they can better understand and help to standardize an approach to evaluating ion migration as a failure mode.\nThese studies can help greatly improve the reliability of materials in safety-critical, high-power electronics, ultimately contributing to the advancement and safety of electric vehicles and other high-voltage applications.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Characterizing material degradation due to ion migration&quot;],&quot;summary&quot;:[0,&quot;Test apparatus design for characterizing material degradation in the presence of high-voltage fields.&quot;],&quot;date&quot;:[3,&quot;2024-05-15T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;materials-science&quot;],[0,&quot;hardware&quot;],[0,&quot;embedded&quot;],[0,&quot;test-equipment&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/ionm_trace_burn.gif&quot;],&quot;role&quot;:[0,&quot;R&amp;D Intern&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;posey.mdx&quot;],&quot;slug&quot;:[0,&quot;posey&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nBiomedical research could greatly benefit from compact, wearable, inertial measurement units (IMUs).\nHowever, commercial solutions are typically expensive and their operation is closed-source and inflexible.\nBuilding a DIY solution with off-the-shelf components means assembling relatively bulky breakout boards and microcontrollers to get a flexible solution to meet the needs of your research.\nThe Posey project addresses this gap with a research-ready IMU sensor suite featuring multi-device operation, on-board logging, and Bluetooth Low Energy (BLE) connectivity.\n\nHere are some of the key features:\n\n- open-source hardware, firmware, and command-line tools;\n- three small form factors: ring, watch, and waist-mounted hub;\n- compact design (the smallest board is 25 x 12.5 mm);\n- BLE connectivity for wireless data transmission; and\n- on-board battery charging.\n\nSee some highlights in the gallery below.\nThe Posey hardware, firmware, and command line tools can be found on [GitHub](https://github.com/SML-Posey).\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/posey_suite.png\&quot;, alt: \&quot;Figure 1: Full Posey suite: waist-mounted hub (top), ring (bottom left), and watch (bottom right).\&quot; },\n    { src: \&quot;/assets/projects/posey_on_hand.png\&quot;, alt: \&quot;Figure 2: Posey ring placed on a finger for a sense of scale.\&quot; },\n    { src: \&quot;/assets/projects/posey_ring.png\&quot;, alt: \&quot;Figure 3. A zoomed photo of the Posey ring.\&quot; },\n  ]}\n/&gt;\n\nThe Posey project was born out of a collaboration between CMU&#39;s Soft Machines Lab and Virginia Tech&#39;s Assistive Robotics Lab.\nSensors would be used to continuously track stroke patients&#39; movements during therapy sessions and daily activities, allowing researchers to assess rehabilitation progress, identify weaknesses, and personalize treatment.\nThe goal was to reduce recovery time and increase restored function.\n\nFor this work, the primary objective was to design a compact, rechargable sensor that integrated a microcontroller, IMU, lithium-polymer battery, and Bluetooth antenna into a form factor small enough to sit comfortably on a finger.\nI aimed to build a device that was compact, precise, and long-lasting.\nThis compact design, necessary for a finger-mounted device, also broadens its applicability to other research projects.\nOne example is [WAFFLE](/research/waffle)[@padmanabha2026waffle], a wearable bite timing system for robot-assisted feeding that won Best Paper at HRI &#39;26 — the Posey IMUs were an integral part of that work.\n\nThe development process was rife with challenges.\nMiniaturization posed a significant hurdle, requiring careful PCB layout and enclosure design to maintain radio performance within the confines of a finger-sized device.\nAs I found out, there are many ways to cripple radio performance with uninformed design choices.\nMulti-device connectivity and BLE stack performance across operating systems were also challenges, and the primary drivers for the design of a hub unit.\nThe hub connects to all peripheral sensors to log all sensor data to flash for download at after a study.\nIt also logs Bluetooth signal strength for all peripherals to improve pose estimates and scans for iBeacon devices for coarse localization in the study area.\nThe NORA-B126 module was chosen because it includes a power amplifier and low-noise amplifier on the RF front-end for more reliable BLE connections.\n\nUsing the hub device for sensor aggregation was an improvement that enabled the use of a coded physical link layer to boost the signal integrity and supported the full BLE bandwidth, neither of which is typically possible on a commodity laptop.\nHowever, it requires sufficient storage capacity which becomes more challenging with more sensors, higher data rates, or longer study durations.\nTo resolve these issues, I extended the hub firmware to instead work on a Nordic Thingy:53 (or similar platform), acting as a BLE to serial-over-USB bridge, resolving the OS- and device-dependent performance.\n\nResearchers interested in using Posey for their work can access the full hardware designs and all software and firmware in the [SML-Posey](https://github.com/SML-Posey) GitHub repository.\nI welcome inquiries and would love to hear about new uses for Posey!\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Posey: BLE-enabled motion tracking&quot;],&quot;summary&quot;:[0,&quot;A small form-factor IMU research platform designed for use in stroke rehabilitation and robotic feeding assistance.&quot;],&quot;date&quot;:[3,&quot;2024-05-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;wearable&quot;],[0,&quot;BLE&quot;],[0,&quot;IMU&quot;],[0,&quot;hardware&quot;],[0,&quot;open-source&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_posey.png&quot;],&quot;role&quot;:[0,&quot;Researcher&quot;],&quot;repoUrl&quot;:[0,&quot;https://github.com/SML-Posey&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;horton.mdx&quot;],&quot;slug&quot;:[0,&quot;horton&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Video from \&quot;../../components/Video.astro\&quot;;\n\nSoft robotics in an exciting field of research focused on the design and application of robotic devices that rely heavily on soft materials for their novel functionality.\nThis field presents several challenges:\n\n- Complicated dynamics: Soft devices exhibit significant non-linear dynamics, hysteretic behavior, and time-dependent material property changes, making them more complicated to model than their rigid counterparts.\n- Difficult kinematics: Their capacity for significant deformation throughout their bulk, along with limited physical constraints, makes inferring kinematics from available sensing modalities challenging.\n- Challenging actuation: The complicated dynamics and sensing, along less precise actuators typically used, make precise control difficult.\n\nHysteresis is particularly problematic.\nFor instance, a viscoelastic polymer&#39;s stress-strain response differs during the strain phase versus relaxation, resulting in a both non-linear and directionally-dependent stress-strain relationship.\nThis work explores these challenges by evaluating a simplified example of such a system: a single, planar, continuum manipulator.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/trajopt_block.gif\&quot;, alt: \&quot;Figure 1: Block diagram of the manipulator design.\&quot; },\n    { src: \&quot;/assets/projects/trajopt_validation.gif\&quot;, alt: \&quot;Figure 2: Open-loop control validation in simulation and hardware.\&quot; },\n    { src: \&quot;/assets/projects/trajopt_teach_and_repeat.gif\&quot;, alt: \&quot;Figure 3: Teach-and-repeat tracking.\&quot; },\n  ]}\n/&gt;\n\nI had the great pleasure of collaborating with [Dr. Andrew Sabelhaus](https://sites.google.com/site/apsabelhaus/) where I investigated more sophisticated models and model-based control methods for his Horton robot.\nWe tackled several key issues on this project including:\n\n1. kinematics,\n1. dynamics modeling,\n1. model calibration,\n1. open-loop control, and\n1. the sim-to-real gap.\n\nPreviously, limb motions were laboriously developed by manually tweaking actuator commands until something close to the desired result was attained.\n\nWe first looked at representing the manipulator dynamics by modeling it as a discrete, rigid, serial-chain actuator.\nThis takes advantage of the minimal axial strain undergone by the limb by posing constraints that help simplify the dynamics and kinematics.\nIt also allowed the use of standard approachs used in rigid systems.\n\nThen we looked at modeling the dynamics of the shape-memory alloy (SMA) antagonistic actuator pair.\nSMA is a rigid metal alloy whose crystalline structure can be reversibly modulated by temperature, providing a means of transducing heat to an axial stress.\nThis required two models: on to model the thermodynamic balance between Joule heating and convective cooling; and the other mapping the SMA temperature to an axial stress.\nThis was a challenge as SMA dynamics are complicated and include parameters nearly impossibly to sense non-destructively, so simplifications had to be made.\n\nOnce models were developed, we used the physical hardware to calibrate the model parameters.\nFor accurate calibration, we devised a number of scenarios to isolate the individual parameters to fit them with minimal data collection.\nA dynamics simulator was built to roll out the calibrated model dynamics given an initial state and a control trajectory.\nThis simulation was used in a standard non-linear optimization to design open-loop controls to closely track a user-designed trajectory while satisfying the dynamic constraints.\nFinally, the process was validated by tracking the designed controls in hardware using a linear quadratic regulator (LQR).\nYou can see an example of our tracking performance in figure 2 which shows the target, simulated, and hardware trajectories.\n\nWe extended the work by adding in a \&quot;teach-and-repeat\&quot; component, where an operator would move the limb along a desired trajectory captured by the device sensors during the \&quot;teach\&quot; phase.\nThe optimal open-loop controls were again learned to actuate the limb to track the desired trajectory.\nWe validated the procedure in the hardware \&quot;repeat\&quot; phase, demonstrating a basic form of human-robot cooporation and training.\nTracking results for the teach-and-repeat work are shown in figure 3.\nThis and other aspects of the work are summarized in the video below published along with the article.\n\n&lt;Video\n  src=\&quot;/assets/projects/trajopt_video.mp4\&quot;\n  caption=\&quot;Video 1. Supplemental video explaining the study.\&quot;\n/&gt;\n\nRead more about this work in our RoboSoft article [@wertz2022trajectory].\nIn parallel, we evaluated the use of completely model-free inference, the work of Drew and Rohan Mehta [@sabelhaus2022situ] where we showed much of the inference can be learned directly without requiring an accurate model of the dynamics.\nThe work also contributed to future studies in safe supervision necessary to execute controls while protecting the SMA coils from overheating [@sabelhaus2024safe], which can cause the SMA to re-train its permanent shape, losing its ability actuate effectively.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Soft manipulator control&quot;],&quot;summary&quot;:[0,&quot;Soft manipulator modeling, calibration and open-loop trajectory optimization.&quot;],&quot;date&quot;:[3,&quot;2022-10-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;soft-robotics&quot;],[0,&quot;trajectory-optimization&quot;],[0,&quot;SMA&quot;],[0,&quot;control&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_trajopt.gif&quot;],&quot;role&quot;:[0,&quot;Researcher&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;datavis.mdx&quot;],&quot;slug&quot;:[0,&quot;datavis&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Figure from \&quot;../../components/Figure.astro\&quot;;\n\nData, especially when there are large amounts of it, can quickly become unruly and difficult to understand.\nTo this end, I have developed and collaborated on numerous data processing tools to make this task somewhat more tenable.\nThis work spans my roles as analyst in the [Auton Lab](https://autonlab.org), doctoral student in the [Soft Machines Lab](http://sml.me.cmu.edu/), and research intern at [Arieca](https://arieca.com).\nThe gallery shows three examples, and we&#39;ll discuss a few others below.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/ss_auviewer.png\&quot;, alt: \&quot;Figure 1: auviewer, a real-time medical data viewing and analysis tool.\&quot; },\n    { src: \&quot;/assets/projects/ss_mcba.png\&quot;, alt: \&quot;Figure 2: MCBA, a post-hoc microcirculation video processing, visualization, and analytics tool.\&quot; },\n    { src: \&quot;/assets/projects/ss_treeview_mouse.png\&quot;, alt: \&quot;Figure 3: TreeView, a tool for analyzing decision trees and the data used to learn them.\&quot; },\n  ]}\n/&gt;\n\nI had the privilege of collaborating with many people on these projects, which span over ten years of research.\nThe development of these various tools was largely ancillary to the overarching goals of our work, but many have turned out to be quite useful, and some of them I am able to share.\n\nFigure 1 in the gallery is [`auviewer`](https://auviewer.readthedocs.io), an abbreviation of \&quot;Auton [Lab] Universal Viewer\&quot;.\nIt is an open-source biomedical data viewer, annotator, and analytics tool I helped develop for analyzing anomaly detection and other algorithms on large amounts of patient data.\nI contributed much more heavily to its underlying data source, [`audata`](https://audata.readthedocs.io), which is an abstraction on top of HDF5 for dealing with large medical time series efficiently.\nOne relevant research outcome this was folded into is that on common data formats and tools in medicine [@laird2021critical].\n\nFigure 2 shows a tool I helped develop to view videos of microcirculation which went through a video processing pipeline to extract information about bloodflow.\nYou can find more information about that on the [MCBA project page](/research/mcba) or check out the related research [@ChaoLiu2015].\n\nFigure 3 shows a tool I developed to process decision trees in random forest classifiers and use them to analyze both the data they were trained on as well as testing data.\nThis was incredibly helpful in debugging bad features or understanding why a classifier did or did not work, and the tool found much use on various projects.\n\nAfter the Auton Lab, I continued building tools to help out with various other projects.\nOne example of this is a tool, [PPGView](https://github.com/TEGSense/ppgview), developed as part of the [TEGSense project](/research/tegsense), to assist in our research on battery-free operation of wearable sensors by harvesting energy from body heat thermoelectric generators [@zadan2024tegsense].\nThe tool allows for real-time data collection via Bluetooth low-energy (BLE) of a battery-free wearable I designed.\nIt also supports device commands and configuration of the MAX30101 photoplethysmograph sensor.\nMore details are on the project page, and the hardware and software are completely open-sourced.\n\n&lt;Figure\n  src=\&quot;/assets/projects/ss_tegsense.jpg\&quot;\n  alt=\&quot;TEGSense PPGView tool\&quot;\n  caption=\&quot;TEGSense PPGView tool.\&quot;\n/&gt;\n\nA similar tool was developed at Arieca for real-time data capture and control of custom test hardware I developed for characterization of material degradation due to ion migration.\nMore details can be found on the [Ion Migration project page](/research/ionm).\n\n&lt;Figure\n  src=\&quot;/assets/projects/ss_ionm.png\&quot;\n  alt=\&quot;IonM tool\&quot;\n  caption=\&quot;IonM tool.\&quot;\n/&gt;\n\nDeveloping tools to assist the research workflow has been very fun and rewarding.\nI am happy there are at least a few projects I am able to open and share here.\nTip: I have grown very fond of [bokeh](https://bokeh.org) for real-time visualization tools, I highly recommend checking it out.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Data and anomaly visualization&quot;],&quot;summary&quot;:[0,&quot;Tool development for real-time and post-hoc data visualization and analytics.&quot;],&quot;date&quot;:[3,&quot;2020-01-15T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;data-visualization&quot;],[0,&quot;tooling&quot;],[0,&quot;open-source&quot;],[0,&quot;bokeh&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/ss_treeview_mouse.png&quot;],&quot;role&quot;:[0,&quot;Research Analyst and Developer&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;tracir.mdx&quot;],&quot;slug&quot;:[0,&quot;tracir&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nReasearch in robotics is profoundly changing what can be accomplished in medicine.\nThis is especially true in the field, where patients may have limited or no direct access to the state-of-the art facilities and highly trained clinical staff you would find in a hospital or clinic.\nThe Trauma Care in a Rucksack (TRACIR) project aims to fundamentally change this.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/tracir_technician_view_anatomy.png\&quot;, alt: \&quot;Figure 1: Real-time data logging, visualization, and hardware control.\&quot; },\n    { src: \&quot;/assets/projects/tracir_deployed.webp\&quot;, alt: \&quot;Figure 2: Successful field deployment and validation.\&quot; },\n    { src: \&quot;/assets/projects/tracir_hardware.jpg\&quot;, alt: \&quot;Figure 3: Portable hardware setup for testing closed-loop resusciation.\&quot; },\n  ]}\n/&gt;\n\nBefore leaving the Auton Lab, I had the great priviledge of playing a fundamental role in the development of an automated platform for the validation of closed-loop physiologic monitoring and resuscitation [@pinsky2024evaluation].\nWith an excellent team in the Auton Lab, I lead the development of the first iteration of a real-time data visualization, logging, and automation control platform (seen in figure 1), along with the integration of all of the critical hardware components into an automation platform.\nThe framework we developed was modular, customizable, and robust.\nRecently, the technology was successfully deployed and validated (figure 2).\nYou can read more about that [in the press release](https://www.cmu.edu/news/stories/archives/2024/may/autonomous-trauma-care-extends-golden-hour-for-saving-lives) or in the scientific publication [@pinsky2024autonomous].\nWe integrated peristaltic pumps for fluid, blood, and medication infusion; biomedical monitors for capture of waveform and beat-to-beat biometrics; and control for automatic ventilation, among other things.\nThe most recent iteration can be see in figure 3 in the gallery.\n\nFrom here our work will transition out of the lab, into the commercial space for furthur testing and development.\nThis research has the potential to greatly improve the likelihood of survival of patients far from specialized care, as in rural regions or humanitarian crises.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Trauma Care in a Rucksack (TRACIR)&quot;],&quot;summary&quot;:[0,&quot;Automated platform for validation of closed-loop physiologic monitoring and resuscitation.&quot;],&quot;date&quot;:[3,&quot;2020-01-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;medical-robotics&quot;],[0,&quot;automation&quot;],[0,&quot;critical-care&quot;],[0,&quot;real-time&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_tracir.png&quot;],&quot;role&quot;:[0,&quot;Automation and Tooling&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;riss-cabg.mdx&quot;],&quot;slug&quot;:[0,&quot;riss-cabg&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nBiomedical data, while abundant, remains underutilized, even today.\nDuring my time at the Auton Lab, we often explored the potential of using such data to predict adverse medical outcomes in order to give advance warning and help clinicians provide timely care.\nI had the great privilege of mentoring [Willa Potosnak](https://potosnakw.github.io/) during her time as an undergraduate researcher in CMU&#39;s Robotics Institute Summer Scholars (RISS) program.\nHer research focused on exploring the utility of biometric data collected before, during, and after coronary artery bypass grafting (CABG) surgery to predict whether or not patients are likely to experience postoperative renal failure.\nPosters for her work in RISS [@potosnak2020cabg] and an abstract accepted at the Society of Thoracic Surgeons (STS) annual meeting [@potosnak2021continuous] are available in the gallery, and I encourage you to explore her work further in those publications.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/riss/2020-RISS-poster-POTOSNAK-Willa-DUBRAWSKI.JPG\&quot;, alt: \&quot;Figure 1: RISS project poster.\&quot; },\n    { src: \&quot;/assets/projects/riss/2021-STS-poster-POTOSNAK-Willa.jpg\&quot;, alt: \&quot;Figure 2: STS 2021 abstract poster.\&quot; },\n  ]}\n  columns={2}\n/&gt;\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Postoperative renal failure prediction&quot;],&quot;summary&quot;:[0,&quot;Modeling of patient biometric data before, during, and after coronary artery bypass graft (CABG) surgery to predict a patient&#39;s likelihood of postoperative acute renal failure.&quot;],&quot;date&quot;:[3,&quot;2019-08-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;machine-learning&quot;],[0,&quot;medical&quot;],[0,&quot;mentoring&quot;],[0,&quot;RISS&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_cabg.png&quot;],&quot;role&quot;:[0,&quot;Research Mentor&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;riss-trafficking.mdx&quot;],&quot;slug&quot;:[0,&quot;riss-trafficking&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nHuman trafficking is a disturbingly widespread problem in the United States, a reality I was largely unaware of prior to joining the Auton Lab.\nThe lab does excellent work in understanding and combating human trafficking, even spinning off a company devoted to it.\nAs part of CMU&#39;s Robotics Institute Summer Scholars (RISS) program, I had the great opportunity to mentor [Carl Edwards](https://cnedwards.com/), whose research focused on analyzing multi-modal data scraped from sex work advertisements online to uncover correlations and patterns that may be indicative of trafficking.\nThe overarching objective of this research is to facilitate the rescue of victims and dismantling of human trafficking organizations.\nI encourage you to take a look at Carl&#39;s poster in the gallery and you can learn more about his work from his final report [@edwards2019detecting].\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/riss/2019-RISS-poster-Edwards.jpg\&quot;, alt: \&quot;Figure 1: RISS project poster.\&quot; },\n  ]}\n  columns={1}\n/&gt;\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Counter human trafficking&quot;],&quot;summary&quot;:[0,&quot;Correlating multi-modal sex worker advertisement data to uncover and combat human trafficking.&quot;],&quot;date&quot;:[3,&quot;2018-08-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;data-science&quot;],[0,&quot;social-good&quot;],[0,&quot;mentoring&quot;],[0,&quot;RISS&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_trafficking.png&quot;],&quot;role&quot;:[0,&quot;Research Mentor&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;riss-nn.mdx&quot;],&quot;slug&quot;:[0,&quot;riss-nn&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nWhile we often strive to build intuitive and interpretable models based on data features we deem meaningful and potentially related to the phenomenon we aim to understand, this approach inherently limits the potential for the learned models to make novel discoveries and uncover previously unknown relationships.\nI had the privilege of mentoring [Chufan Gao](https://chufangao.github.io/) during his time as an undergraduate researcher in CMU&#39;s Robotics Institute Summer Scholars (RISS) program.\nBuilding upon our investigations into modeling and predicting hemodynamic shock (you can read more about that project [here](/research/heme)), Chufan analyzed the same data through a more unbiased lens, employing various deep neural network architectures to directly encode and model the raw waveform data.\nHis poster is available in the gallery, and I encourage you to explore this work further in his NeurIPS abstract [@gao2019detecting].\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/riss/2019-RISS-poster-Gao.jpg\&quot;, alt: \&quot;Figure 1: RISS project poster.\&quot; },\n  ]}\n  columns={1}\n/&gt;\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Physiologic state clustering in shock&quot;],&quot;summary&quot;:[0,&quot;Unsupervised segmentation of physiologic state during crash using convolutional autoencoders.&quot;],&quot;date&quot;:[3,&quot;2018-01-15T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;deep-learning&quot;],[0,&quot;medical&quot;],[0,&quot;mentoring&quot;],[0,&quot;RISS&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_state_clustering.png&quot;],&quot;role&quot;:[0,&quot;Research Mentor&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;heme.mdx&quot;],&quot;slug&quot;:[0,&quot;heme&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\nimport Figure from \&quot;../../components/Figure.astro\&quot;;\n\nBiomedical data at the bedside and in the field is abundant, but underutilized.\nThis is particularly true for fast detection of disease onset.\nIn the [Auton Lab](https://autonlab.org) I investigated the use of bedside monitoring data for fast detection of hemorrhagic shock.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/plot_heme_rocor.jpeg\&quot;, alt: \&quot;Figure 1: ROCORs showing detection performance based on featurization.\&quot; },\n    { src: \&quot;/assets/projects/plot_heme_amoc.jpeg\&quot;, alt: \&quot;Figure 2: AMOCs showing detection time based on featurization.\&quot; },\n    { src: \&quot;/assets/projects/plot_heme_amoc_personal.jpeg\&quot;, alt: \&quot;Figure 3: AMOCs showing detection time based on featurization when using a personalized baseline.\&quot; },\n  ]}\n/&gt;\n\nI had the privilege of working closely with many great researchers on this project, both from the Auton Lab and from the University of Pittsburgh Medical Center (UPMC).\nAfter taking over the work from [Dr. Mathieu Guillame-Bert](https://scholar.google.com/citations?hl=en&amp;user=FO_6zFIAAAAJ) my main task was train and evaluate machine learning (ML) models of hemorrhagic shock.\nWe used data from prior work [@gomez2012physiologic] collected from animal models of hemorrhage with the objective of quickly detecting the onset of hemorrhage.\nThe main points for investigation were the influence of increasing data density and per-patient personalization [@wertz2019increasing], along with a look at the sets of more or less invasive monitoring paradigms [@pinsky2020parsimony].\nModel performance was evaluated based on detection latency using Activity Monitoring Operating Characteristic (AMOC) curves and detection performance using ROCORs, a variant of Receiver Operating Characteristic (ROC) curves.\nA ROCOR is just two ROC curves glued back-to-back, looking at positive and negative classification performance.\nIf you are not familiar with either of these tools, I encourage you to check out slides 33-54 of a [presentation I gave](/assets/presentations/2017_Wertz_CRISMA.pdf) on the topic, which present the two in a step-by-step visual format.\nThat presentation is also helpful for understanding this work in general, as it walks through the results for an audience with no assumed ML background.\n\nThe gory details of the work include all the elements from a standard ML pipeline: raw data wrangling, featurization, model building, and cross-validation.\nIn this way we are able to explore the central questions of the research and provide some guidance on how hemorrhage detection can be accomplished at the bedside, in the field, or even at home.\nTo me, the research really represents an exciting future for medicine where tools built utilize artificial intelligence to give clinical workers better situational awareness and more timely (and useful) alerts.\nThe general findings are summarized as such:\n\n&lt;Figure\n  src=\&quot;/assets/projects/prj_heme.png\&quot;\n  alt=\&quot;Research findings\&quot;\n  caption=\&quot;Summary of research findings.\&quot;\n/&gt;\n\nIn an extension of this work, I mentored Chufan Gao, a student in CMU&#39;s Robotics Institute Summer Scholars (RISS) program, in approaching the problem from a different, more exploratory direction, trying to understand and cluster the data using deep learning methods instead [@gao2019detecting].\n\nThis work provides a foundation for some of my work on the TRACIR project and spurred some of advancements in data investigation tools, which you can learn more about as well.\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Fast detection of hemorrhagic shock&quot;],&quot;summary&quot;:[0,&quot;Investigation of patient personalization and data granularity in detection of hemorrhagic shock.&quot;],&quot;date&quot;:[3,&quot;2018-01-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;machine-learning&quot;],[0,&quot;medical&quot;],[0,&quot;hemorrhage&quot;],[0,&quot;signal-processing&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_heme.png&quot;],&quot;role&quot;:[0,&quot;Research analyst&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;mcba.mdx&quot;],&quot;slug&quot;:[0,&quot;mcba&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nAdvances in signal processing and miniaturization of sensors and electronics have allowed biomedical technology to improve by leaps and bounds in the last decade.\nProcessing imaging sensor data in particular has made strides in helping to analyze and understand complicated and noisy sensor data in radiology, tomography, among others.\nIn the [Auton Lab](https://autonlab.org) I had the opportunity to look at a measurement I was much less familiar with: capillary bloodflow.\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/ss_mcba.png\&quot;, alt: \&quot;Figure 1: MCBA web interface for video processing and analysis.\&quot; },\n    { src: \&quot;/assets/projects/prj_mcba.gif\&quot;, alt: \&quot;Figure 2: Magnified microcirculatory flow to highlight clear bloodflow.\&quot; },\n    { src: \&quot;/assets/projects/prj_mcba_vess.gif\&quot;, alt: \&quot;Figure 3: Stabilized video with vessel overlay.\&quot; },\n  ]}\n/&gt;\n\nI had the great privilege of working closely with [Dr. Chao Liu](https://scholar.google.com/citations?hl=en&amp;user=8gAliWUAAAAJ), who was investigating computer vision techniques to process video taken of the microcirculation and extract quantifiable metrics to be used in the prediction of disease state.\nMy role was to use my background in real-time software development to reimplement the processing and analysis pipeline to batch process many videos efficiently on a server backend and expose a frontend web interface for physician researchers to upload and process their own videos.\nThis involved a lot of interesting challenges: first in understanding and reimplementing the processing pipeline; then in building an efficient server-side implementation; and finally in designing and deploying a user-friendly interface.\n\nAt a high level the pipeline consisted of a few important steps:\n\n1. Exposure throughout a video was normalized to a baseline to reduce processing mistakes due to changes in illumination and to standardize comparison across different videos;\n2. Video stabilization was performed to reduce noise due to camera or tissue movement;\n3. Background subtraction and motion magnification was performed to highlight the moving entities in the video (e.g., the blood cells themselves);\n4. Vessel center lines were identified to allow for flow quantification;\n5. Local vessel flow rates and patterns were identified and aggregated to provide some quantified metrics for understanding the microcirculation.\n\nEfficient implementation required the use of optimized vision and linear algebra libraries, in this case OpenCV and Eigen3 using Intel&#39;s BLAS implementation.\nIt also required implementation using CUDA to run on NVIDIA GPUs for bulk processing of dense video data.\nFinally, where possible, multithreading was used to parallelize CPU-bound tasks.\n\nAll of this made available to physicians through a web user interface, including both a REST framework to interface with the backend processing pipeline and a front-facing web interface.\n\nIf you want to learn more about this method, I highly recommend checking out Chao&#39;s article in CVPR [@ChaoLiu2015].\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Microcirculatory Bloodflow Analysis (MCBA)&quot;],&quot;summary&quot;:[0,&quot;Video processing and analysis to correlate changes in microcirculation with disease state.&quot;],&quot;date&quot;:[3,&quot;2017-01-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;computer-vision&quot;],[0,&quot;medical&quot;],[0,&quot;video-processing&quot;],[0,&quot;OpenCV&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_mcba.gif&quot;],&quot;role&quot;:[0,&quot;Research software developer&quot;]}],&quot;render&quot;:[0,null]}],[0,{&quot;id&quot;:[0,&quot;rtba.mdx&quot;],&quot;slug&quot;:[0,&quot;rtba&quot;],&quot;body&quot;:[0,&quot;\nimport ImageGallery from \&quot;../../components/ImageGallery.astro\&quot;;\n\nNuclear threat detection is a complicated and difficult task.\nThere are numerous challenges to be overcome in the process:\nradioactive material sourced for nefarious purposes will likely be shielded to prevent detection, yielding a very weakly detectable signal easily drowned out by background radiation from anything from buildings, concrete, to bananas;\ntransport routes, especially past the national border, are largely unknown and would likely be chosen to minimize exposure to avoid detection;\nand the placement and movement of sensors will largely dictate how effective a detection framework will be.\nSee what you can make of these figures, then keep reading for some more details!\n\n&lt;ImageGallery\n  images={[\n    { src: \&quot;/assets/projects/ss_rtba_path.png\&quot;, alt: \&quot;Figure 1: Heatmaps with and without source injection.\&quot; },\n    { src: \&quot;/assets/projects/ss_rtba.png\&quot;, alt: \&quot;Figure 2: Localization precision with and without background estimation.\&quot; },\n  ]}\n  columns={2}\n/&gt;\n\nI had the privilege of working with and learning from excellent researchers, especially [Dr. Prateek Tandon](https://scholar.google.com/citations?hl=en&amp;user=nQaxVCsAAAAJ), in the [Auton Lab](https://autonlab.org) at Carnegie Mellon University on how to overcome the challenge of low signal-to-noise (SNR) ratios, especially when you have some prior knowledge of the sources of interest and the expected background.\nA very powerful framework developed by the lab, and an excellent research thesis [@Tandon2018], is called Bayesian aggregation.\n\nAt a high level, the procedure is very simple: you collect samples in real-time, and update a probability map indicating the likelihood of a source present.\nCandidate hypotheses are incrementally updated by aggregating evidence of a source at any particular location given the current observation.\nMuch of the magic of the process comes from the processes of filtering, background subtraction, and the Bayesian update itself.\nUsing this approach, even very small signals can be localized with high precision.\nIn figure 1 you can see BA in action, comparing the same trajectory with and without source injection.\nWithout source injection, there&#39;s no obvious evidence of a threat (note the heat map is showing log probabilities of a source detection, so very low values).\nWith source injection, the entire map gets dark except for a high-probability bright spot at the point of the injected source.\nIn figure 2 you can see how a model of the background radiation can be incorporated to increase the SNR and improve localization precision.\n\nAs one of my first roles in the lab, I used my background in real-time software development to design and implements C/C++ and Java modules employing the BA and filtering algorithms developed in-house for deployment.\nIt was a very exciting learning experience and I was very happy to play a role in this endeavor.\n\nIf you want to learn more about this method, I highly recommend checking out Prateek&#39;s thesis [@Tandon2018] along with some additional [works on BA out of the Auton Lab](https://scholar.google.com/scholar?hl=en&amp;as_sdt=0%2C39&amp;q=artur+dubrawski+bayesian+aggregation&amp;btnG=).\n&quot;],&quot;collection&quot;:[0,&quot;research&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Real-time Bayesian Aggregation (RTBA)&quot;],&quot;summary&quot;:[0,&quot;Real-time detection of low SNR radionuclide threats.&quot;],&quot;date&quot;:[3,&quot;2015-09-01T00:00:00.000Z&quot;],&quot;tags&quot;:[1,[[0,&quot;signal-processing&quot;],[0,&quot;Bayesian&quot;],[0,&quot;nuclear-detection&quot;],[0,&quot;real-time&quot;]]],&quot;heroImage&quot;:[0,&quot;/assets/projects/prj_rtba.png&quot;],&quot;role&quot;:[0,&quot;Research software developer&quot;]}],&quot;render&quot;:[0,null]}]]]}" ssr="" client="load" opts="{&quot;name&quot;:&quot;SearchCollectionTiles&quot;,&quot;value&quot;:true}" await-children=""><div data-hk=s00000 class="flex flex-col gap-6"><div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center"><div class="flex-1 w-full"><div data-hk=s000010 class="relative"><svg class="absolute size-6 left-2 top-[0.45rem] stroke-neutral-400 dark:stroke-neutral-500 pointer-events-none"><use href="/ui.svg#search"></use></svg><input name="search" type="text" value="" autocomplete="off" spellcheck="false" placeholder="Search research..." class="w-full px-10 py-1.5 rounded outline-none placeholder-neutral-400 dark:placeholder-neutral-500 text-black dark:text-white bg-black/5 dark:bg-white/10 hover:bg-black/10 hover:dark:bg-white/15 focus:bg-black/10 focus:dark:bg-white/15 border border-black/10 dark:border-white/10 focus:border-black/40 focus:dark:border-white/40"><!--$--><!--/--></div></div><div class="flex items-center gap-3 shrink-0"><div class="text-sm uppercase opacity-60"><!--$-->0<!--/--> / <!--$-->14<!--/--></div><button class="flex items-center gap-1 text-sm uppercase stroke-neutral-400 dark:stroke-neutral-500 hover:stroke-black hover:dark:stroke-white text-neutral-400 dark:text-neutral-500 hover:text-black hover:dark:text-white transition-colors duration-200"><!--$-->Newest<!--/--><svg class="size-5"><use href="/ui.svg#sort-descending" class="block"></use><use href="/ui.svg#sort-ascending" class="hidden"></use></svg></button><!--$--><!--/--></div></div><div class="flex flex-wrap gap-1.5"><button data-hk=s000020 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">analog-circuits</button><button data-hk=s000021 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">assistive-robotics</button><button data-hk=s000022 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 d</button><button data-hk=s00002a13 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">energy-harvesting</button><button data-hk=s00002a14 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">feeding</button><button data-hk=s00002a15 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">hardware</button><button data-hk=s00002a16 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">hemorrhage</button><button data-hk=s00002a17 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">HRI</button><button data-hk=s00002a18 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">IMU</button><button data-hk=s00002a19 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">machine-learning</button><button data-hk=s00002a20 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">materials-science</button><button data-hk=s00002a21 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">medical</button><button data-hk=s00002a22 class="px-2.5 py-1 rounded-full text-xs uppercase transition-colors duration-200 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20">medical-robotics</button><button data-hk=s00002a23
